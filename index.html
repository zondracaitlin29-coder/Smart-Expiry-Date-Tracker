<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#001F3F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Expiry Tracker">
    <title>Expiry Date Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            color: #333;
            padding-bottom: 80px;
        }

        /* Header */
        header {
            background-color: #001F3F;
            color: white;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 4px rgba(0, 31, 63, 0.1);
        }

        header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 1rem;
            padding: 0 1rem;
        }

        .search-bar {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #001F3F;
            border-radius: 4px;
            font-size: 1rem;
            background-color: #fff;
        }

        .search-bar:focus {
            outline: none;
            border-color: #d32f2f;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background-color: #f5f5f5;
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background-color: #001F3F;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .tab-btn.inactive {
            background-color: #e0e0e0;
            color: #333;
        }

        .tab-btn:active {
            transform: scale(0.98);
        }

        /* Add Product Button */
        .add-btn {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #001F3F;
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 31, 63, 0.3);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        /* Product List */
        .product-list {
            list-style: none;
            padding: 1rem;
        }

        .product-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 1rem;
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            margin-bottom: 0.75rem;
            transition: all 0.3s ease;
        }

        .product-item.expiring-soon {
            background-color: #ffebee;
            border-color: #d32f2f;
        }

        .product-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 0.25rem;
            cursor: pointer;
            accent-color: #d32f2f;
            flex-shrink: 0;
        }

        .product-item input[type="checkbox"]:checked {
            accent-color: #001F3F;
        }

        .product-info {
            flex: 1;
            min-width: 0;
        }

        .product-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
            font-size: 0.95rem;
            word-break: break-word;
        }

        .product-quantity {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0.25rem;
        }

        .expiry-dates {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .days-until {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .days-critical {
            color: #d32f2f;
        }

        .days-normal {
            color: #001F3F;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: #999;
        }

        .empty-state-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: white;
            padding: 1.5rem;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #001F3F;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
        }

        input[type="text"],
        input[type="date"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="date"]:focus {
            outline: none;
            border-color: #001F3F;
        }

        .modal-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #001F3F;
            color: white;
        }

        .btn-primary:active {
            background-color: #000;
        }

        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-secondary:active {
            background-color: #ccc;
        }

        /* Stats Bar */
        .stats-bar {
            background-color: #f5f5f5;
            padding: 1rem;
            margin: 0 1rem 1rem;
            border-radius: 4px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            font-size: 0.9rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #001F3F;
        }

        .stat-label {
            color: #666;
            font-size: 0.8rem;
        }

        .stat-number.critical {
            color: #d32f2f;
        }

        /* Responsive */
        @media (max-width: 480px) {
            header h1 {
                font-size: 1.25rem;
            }

            .product-item {
                padding: 0.75rem;
            }

            .tab-btn {
                font-size: 0.8rem;
                padding: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>📦 Expiry Tracker</h1>
        <p style="font-size: 0.9rem; opacity: 0.9;">Track products expiring soon</p>
    </header>

    <div class="stats-bar" id="statsBar">
        <div class="stat-item">
            <div class="stat-number critical" id="expiringCount">0</div>
            <div class="stat-label">Expiring Soon</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">Total Items</div>
        </div>
    </div>

    <div class="search-container">
        <input 
            type="text" 
            class="search-bar" 
            id="searchInput" 
            placeholder="Search products..."
            aria-label="Search products"
        >
    </div>

    <div class="nav-tabs">
        <button class="tab-btn" id="expiringTab" data-tab="expiring">⏰ Expiring Soon</button>
        <button class="tab-btn inactive" id="allTab" data-tab="all">📋 All Products</button>
    </div>

    <ul class="product-list" id="productList"></ul>

    <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-state-icon">✅</div>
        <p>No products to display</p>
    </div>

    <button class="add-btn" id="addBtn" aria-label="Add new product">+</button>

    <!-- Add Product Modal -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">Add New Product</div>
            <form id="addForm">
                <div class="form-group">
                    <label for="productName">Product Name *</label>
                    <input 
                        type="text" 
                        id="productName" 
                        required 
                        placeholder="e.g., Act II Butter"
                    >
                </div>
                <div class="form-group">
                    <label for="productQuantity">Quantity *</label>
                    <input 
                        type="text" 
                        id="productQuantity" 
                        required 
                        placeholder="e.g., 3x85g or 500ml"
                    >
                </div>
                <div class="form-group">
                    <label for="expiryDate">Expiry Date *</label>
                    <input 
                        type="date" 
                        id="expiryDate" 
                        required
                    >
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Product</button>
                </div>
            </form>
        </div>
    </div>

            getDaysUntilExpiry(dateString) {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const expiryDate = new Date(dateString);
                expiryDate.setHours(0, 0, 0, 0);
                const timeDiff = expiryDate - today;
                return Math.ceil(timeDiff / (1000 * 3600 * 24));
            },

            getEarliestDate(dates) {
                return dates.reduce((earliest, current) => {
                    return new Date(current) < new Date(earliest) ? current : earliest;
                });
            },

            isExpiringCritical(daysUntil) {
                return daysUntil <= 15;
            },

            getFilteredProducts() {
                let filtered = this.products.filter(p => !p.removed);

                if (this.currentView === 'expiring') {
                    filtered = filtered.filter(p => {
                        const daysUntil = this.getDaysUntilExpiry(this.getEarliestDate(p.dates));
                        return this.isExpiringCritical(daysUntil);
                    });
                }

                if (this.searchQuery.trim()) {
                    filtered = filtered.filter(p => 
                        p.name.toLowerCase().includes(this.searchQuery.toLowerCase())
                    );
                }

                return filtered;
            },

            formatDate(dateString) {
                const date = new Date(dateString);
                return new Intl.DateTimeFormat('en-ZA', { 
                    day: '2-digit', 
                    month: '2-digit', 
                    year: 'numeric' 
                }).format(date);
            },

            render() {
                const list = document.getElementById('productList');
                const emptyState = document.getElementById('emptyState');
                const filtered = this.getFilteredProducts();

                list.innerHTML = '';

                if (filtered.length === 0) {
                    list.style.display = 'none';
                    emptyState.style.display = 'block';
                    return;
                }

                list.style.display = 'block';
                emptyState.style.display = 'none';

                filtered.forEach(product => {
                    const earliestDate = this.getEarliestDate(product.dates);
                    const daysUntil = this.getDaysUntilExpiry(earliestDate);
                    const isCritical = this.isExpiringCritical(daysUntil);

                    const li = document.createElement('li');
                    li.className = `product-item ${isCritical ? 'expiring-soon' : ''}`;

                    const daysClass = isCritical ? 'days-critical' : 'days-normal';
                    const daysText = daysUntil <= 0 ? 'EXPIRED' : `${daysUntil} days`;

                    li.innerHTML = `
                        <input 
                            type="checkbox" 
                            class="remove-checkbox"
                            data-id="${product.id}"
                            aria-label="Mark as removed"
                        >
                        <div class="product-info">
                            <div class="product-name">${product.name}</div>
                            <div class="product-quantity">${product.quantity}</div>
                            <div class="expiry-dates">${product.dates.map(d => this.formatDate(d)).join(', ')}</div>
                            <div class="days-until ${daysClass}">📅 ${daysText}</div>
                        </div>
                    `;

                    list.appendChild(li);
                });

                this.attachCheckboxListeners();
            },

            attachCheckboxListeners() {
                document.querySelectorAll('.remove-checkbox').forEach(checkbox => {
                    checkbox.addEventListener('change', (e) => {
                        const id = parseInt(e.target.dataset.id);
                        const product = this.products.find(p => p.id === id);
                        if (product) {
                            product.removed = e.target.checked;
                            this.saveProducts();
                            this.render();
                        }
                    });
                });
            },

            updateStats() {
                const total = this.products.filter(p => !p.removed).length;
                const expiring = this.products.filter(p => {
                    if (p.removed) return false;
                    const daysUntil = this.getDaysUntilExpiry(this.getEarliestDate(p.dates));
                    return this.isExpiringCritical(daysUntil);
                }).length;

                document.getElementById('totalCount').textContent = total;
                document.getElementById('expiringCount').textContent = expiring;
            },

            attachEventListeners() {
                // Tab switching
                document.getElementById('expiringTab').addEventListener('click', () => {
                    this.currentView = 'expiring';
                    this.updateTabButtons();
                    this.render();
                });

                document.getElementById('allTab').addEventListener('click', () => {
                    this.currentView = 'all';
                    this.updateTabButtons();
                    this.render();
                });

                // Search
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.searchQuery = e.target.value;
                    this.render();
                });

                // Add product modal
                const modal = document.getElementById('addModal');
                const addBtn = document.getElementById('addBtn');
                const cancelBtn = document.getElementById('cancelBtn');
                const addForm = document.getElementById('addForm');

                addBtn.addEventListener('click', () => {
                    modal.classList.add('active');
                });

                cancelBtn.addEventListener('click', () => {
                    modal.classList.remove('active');
                    addForm.reset();
                });

                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.classList.remove('active');
                        addForm.reset();
                    }
                });

                addForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('productName').value.trim();
                    const quantity = document.getElementById('productQuantity').value.trim();
                    const date = document.getElementById('expiryDate').value;

                    if (name && quantity && date) {
                        const newProduct = {
                            id: Math.max(...this.products.map(p => p.id), 0) + 1,
                            name,
                            quantity,
                            dates: [date],
                            removed: false
                        };

                        this.products.push(newProduct);
                        this.saveProducts();
                        this.render();
                        modal.classList.remove('active');
                        addForm.reset();
                    }
                });
            },

            updateTabButtons() {
                const expiringTab = document.getElementById('expiringTab');
                const allTab = document.getElementById('allTab');

                if (this.currentView === 'expiring') {
                    expiringTab.classList.remove('inactive');
                    allTab.classList.add('inactive');
                } else {
                    expiringTab.classList.add('inactive');
                    allTab.classList.remove('inactive');
                }
            }
        };

        // Start app when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
